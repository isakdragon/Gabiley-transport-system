<!DOCTYPE html>
<html>
<head>
    <title>Gabiley Transport System</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f0f0f0; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; display: block; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #219150; }
        h3 { color: #2c3e50; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Gabiley Transport</h2>
        
        <input type="text" id="userName" placeholder="Your Name (Passenger)">
        
        <input type="number" id="userPhone" placeholder="Your Phone Number">

        <select id="vehicleType">
            <option value="Bus">Bus (Public) 25,000sh </option>
            <option value="Private Car">Private Car 35,000sh </option>
            <option value="Truck">Truck (Cargo) 50,000sh</option>
        </select>
        
        <select id="routeSelect">
            <option value="Gabiley to Hargeisa">Gabiley to Hargeisa</option>
            <option value="Gabiley to Wajaale">Gabiley to Wajaale</option>
            <option value="Gabiley to Hargeisa">Gabiley to kalabaydh</option>
            <option value="Gabiley to Hargeisa">Gabiley to burco</option>
            <option value="Gabiley to Hargeisa">Gabiley to borama</option>
        </select>

        <button onclick="recordTrip()">Register Trip</button>

        <h3 id="displayArea"></h3>
    </div>

    <script>
        function recordTrip() {
            let user = document.getElementById("userName").value;
            let phone = document.getElementById("userPhone").value;
            let vehicle = document.getElementById("vehicleType").value;
            let route = document.getElementById("routeSelect").value;

            if (user === "" || phone === "") {
                alert("Fadlan Geli Xogtaada!");
                return;
            }

            document.getElementById("displayArea").innerHTML = 
                "<strong>Success! Fadlan Hore U Kaalay!</strong><br>" + 
                "Passenger: " + user + " (" + phone + ")<br>" +
                "Vehicle: " + vehicle + "<br>" +
                "Route: " + route;

            console.log("New booking for: " + user);
        }
    </script>

</body>
</html>
